<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Slide Puzzle - 2 Holes Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrapper">
        <header>
            <h1 class="retro-title">EXPOP PUZZLE</h1>
            <div class="stats-container">
                <div class="stat-item">
                    TIME: <span id="timer">00:00</span>
                    <button id="pause-btn" class="btn-pause">START</button>
                </div>
                <div class="stat-item">MOVES: <span id="moves">0</span></div>
            </div>
        </header>

        <main>
            <!-- Khu vực bàn cờ -->
            <div id="puzzle-board" class="puzzle-board"></div>
        </main>

        <footer>
            <div class="control-panel">
                <div class="input-group">
                    <label for="difficulty">Level:</label>
                    <select id="difficulty">
                        <!-- Options will be generated by JS -->
                    </select>
                </div>

                <div class="input-group">
                    <label for="image-theme">Image:</label>
                    <select id="image-theme">
                        <option value="0">Việt Nam</option>
                        <option value="custom" id="custom-option" style="display:none;">Custom Photo</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label>BGM:</label>
                    <button id="music-toggle-btn" class="btn btn-secondary">Music: ON</button>
                    <label for="music-upload" class="btn btn-secondary">Load Audio</label>
                    <input type="file" id="music-upload" accept="audio/*" style="display:none;">
                    <label for="volume-slider">Vol:</label>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5" style="width: 80px; vertical-align: middle;">
                </div>

                <div class="button-group">
                    <label for="image-upload" class="btn btn-secondary">Upload Photo</label>
                    <input type="file" id="image-upload" accept="image/*">
                    <button id="view-original-btn" class="btn btn-secondary">View Original</button>
                    <button id="history-btn" class="btn btn-secondary">History</button>
                </div>
            </div>
        </footer>
    </div>

    <!-- Thông báo chiến thắng -->
    <div id="win-modal" class="modal">
        <div class="modal-content">
            <h2 class="win-text">YOU WIN!</h2>
            <p id="final-stats"></p>
            <div class="button-group">
                <button onclick="closeModal()" class="btn btn-secondary">Play Again</button>
                <button id="next-level-btn" class="btn btn-primary">Next Level</button>
            </div>
        </div>
    </div>

    <!-- Modal hiển thị ảnh gốc -->
    <div id="original-image-modal" class="modal">
        <div class="modal-content">
            <img id="original-image-display" src="" alt="Original Puzzle Image" class="original-image-display">
            <button onclick="hideOriginalImage()" class="btn btn-primary" style="margin-top: 20px;">Close</button>
        </div>
    </div>

    <!-- Modal Lịch sử chơi -->
    <div id="history-modal" class="modal">
        <div class="modal-content" style="max-width: 400px; max-height: 80vh; overflow-y: auto;">
            <h2 style="color: var(--success); margin-bottom: 15px;">HISTORY</h2>
            <div id="history-list"></div>
            <button onclick="document.getElementById('history-modal').style.display='none'" class="btn btn-primary" style="margin-top: 20px;">Close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
